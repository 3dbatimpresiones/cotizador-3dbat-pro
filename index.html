<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>COTIZADOR 3DBAT PRO</title>
  <meta name="theme-color" content="#131D47" />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="logo.ico" />

  <!-- React & Tailwind -->
  <link rel="stylesheet" href="tailwind-pro.css">
  <script src="react.development.js"></script>
  <script src="react-dom.development.js"></script>
  <script src="babel7.min.js"></script>
  <script src="confetti.browser.min.js"></script>

  <!-- PDF Libraries (Local) -->
  <script src="html2canvas.min.js"></script>
  <script src="jspdf.umd.min.js"></script>

  <!-- Supabase Auth -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      overscroll-behavior-y: none;
      transition: background-color 0.5s ease, color 0.5s ease;
    }

    /* THEME: ORIGINAL */
    body.theme-original {
      background-color: #131D47;
      background-image:
        radial-gradient(circle at 10% 10%, rgba(52, 55, 162, 0.4) 0%, transparent 50%),
        radial-gradient(circle at 90% 15%, rgba(247, 142, 182, 0.25) 0%, transparent 40%),
        radial-gradient(circle at 85% 85%, rgba(93, 218, 219, 0.2) 0%, transparent 40%),
        radial-gradient(circle at 10% 90%, rgba(52, 55, 162, 0.3) 0%, transparent 40%);
      background-attachment: fixed;
      color: #e2e8f0;
    }

    /* THEME: LIGHT */
    body.theme-light {
      background-color: #f0f4f8;
      background-image: none;
      color: #1e293b;
    }

    /* THEME: DARK */
    body.theme-dark {
      background-color: #0a0a0a;
      background-image: none;
      color: #f1f5f9;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #3437A2;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #5DDADB;
    }

    .glass-panel {
      background: rgba(52, 55, 162, 0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Hide number input spinners */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-5px);
      }

      100% {
        transform: translateY(0px);
      }
    }

    .animate-float {
      animation: float 4s ease-in-out infinite;
    }

    @keyframes shake {
      0% {
        transform: translate(1px, 1px) rotate(0deg);
      }

      10% {
        transform: translate(-1px, -2px) rotate(-1deg);
      }

      20% {
        transform: translate(-3px, 0px) rotate(1deg);
      }

      30% {
        transform: translate(3px, 2px) rotate(0deg);
      }

      40% {
        transform: translate(1px, -1px) rotate(1deg);
      }

      50% {
        transform: translate(-1px, 2px) rotate(-1deg);
      }

      60% {
        transform: translate(-3px, 1px) rotate(0deg);
      }

      70% {
        transform: translate(3px, 1px) rotate(-1deg);
      }

      80% {
        transform: translate(-1px, -1px) rotate(1deg);
      }

      90% {
        transform: translate(1px, 2px) rotate(0deg);
      }

      100% {
        transform: translate(1px, -2px) rotate(-1deg);
      }
    }

    .animate-shake {
      animation: shake 0.5s;
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
      border-color: rgb(239, 68, 68) !important;
    }

    #error-display {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #991b1b;
      color: white;
      padding: 20px;
      z-index: 9999;
      font-family: monospace;
    }
  </style>
</head>

<body class="theme-original">
  <div id="error-display"></div>
  <div id="root"></div>

  <script>
    window.onerror = function (message, source, lineno, colno, error) {
      const el = document.getElementById('error-display');
      if (el) {
        el.style.display = 'block';
        el.innerHTML = '<strong>CRITICAL ERROR:</strong> ' + message + '<br>Line: ' + lineno;
      }
    };
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useLayoutEffect } = React;

    // =====================================================================
    // SUPABASE CONFIG — Reemplazar con tus credenciales reales
    // =====================================================================
    const SUPABASE_URL      = 'https://llciggitqtseosfklbjl.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_du93qodYkSZRevJ-BgXUGw_BrFc6JMO';
    const GOOGLE_FORM_URL   = 'https://forms.gle/TTJCnphD3surkyA1A';
    const { createClient }  = supabase;
    const sb                = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // =====================================================================
    // COMPONENTES DE AUTH
    // =====================================================================

    const LoadingScreen = ({ message = 'Verificando acceso...' }) => (
      <div className="min-h-screen flex items-center justify-center"
           style={{ background: '#131D47' }}>
        <div className="text-center">
          <div className="w-14 h-14 border-4 border-white/10 border-t-[#5DDADB] rounded-full animate-spin mx-auto mb-5"></div>
          <p className="text-white/70 text-sm font-medium">{message}</p>
        </div>
      </div>
    );

    const AuthCard = ({ children }) => (
      <div className="min-h-screen flex items-center justify-center p-4"
           style={{ background: 'linear-gradient(135deg, #131D47 0%, #1a2560 50%, #131D47 100%)' }}>
        <div style={{ maxWidth: 420, width: '100%' }}>
          <div className="text-center mb-8">
            <h1 className="text-4xl font-bold text-white tracking-tight">
              COTIZADOR <span style={{ color: '#5DDADB' }}>3DBAT</span>
            </h1>
            <p className="text-lg font-bold" style={{ color: '#F78EB6' }}>PRO 2.0</p>
            <p className="text-white/50 text-sm mt-2">Herramienta exclusiva para miembros del Makers Club 3DBAT</p>
          </div>
          <div className="rounded-3xl border border-white/10 p-8"
               style={{ background: 'rgba(255,255,255,0.05)', backdropFilter: 'blur(20px)' }}>
            {children}
          </div>
        </div>
      </div>
    );

    const GoogleIcon = () => (
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
    );

    const StatusBadge = ({ status }) => {
      const cfg = {
        pending:   { label: 'Pendiente',  bg: 'rgba(251,191,36,0.15)',  border: 'rgba(251,191,36,0.4)',  text: '#FBBF24' },
        approved:  { label: 'Aprobado',   bg: 'rgba(52,211,153,0.15)',  border: 'rgba(52,211,153,0.4)',  text: '#34D399' },
        rejected:  { label: 'Rechazado',  bg: 'rgba(239,68,68,0.15)',   border: 'rgba(239,68,68,0.4)',   text: '#EF4444' },
        suspended: { label: 'Suspendido', bg: 'rgba(249,115,22,0.15)',  border: 'rgba(249,115,22,0.4)',  text: '#F97316' },
        expired:   { label: 'Vencido',    bg: 'rgba(156,163,175,0.15)', border: 'rgba(156,163,175,0.4)', text: '#9CA3AF' },
      }[status] || { label: status, bg: 'rgba(255,255,255,0.1)', border: 'rgba(255,255,255,0.2)', text: '#fff' };
      return (
        <span className="text-xs font-bold px-3 py-1 rounded-full border"
              style={{ background: cfg.bg, borderColor: cfg.border, color: cfg.text }}>
          {cfg.label}
        </span>
      );
    };

    const LoginScreen = () => {
      const [loading, setLoading] = useState(false);
      const [error, setError]     = useState(null);

      const signInWithGoogle = async () => {
        setLoading(true);
        setError(null);
        const redirectTo = window.location.href.split('#')[0].split('?')[0];
        const { error: e } = await sb.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo }
        });
        if (e) { setError('Error al conectar con Google. Intentá de nuevo.'); setLoading(false); }
      };

      return (
        <AuthCard>
          <div className="rounded-2xl p-4 mb-6 border"
               style={{ background: 'rgba(52,55,162,0.2)', borderColor: 'rgba(52,55,162,0.4)' }}>
            <p className="text-white/70 text-sm text-center leading-relaxed">
              Para ingresar necesitás ser miembro activo del Makers Club 3DBAT.
              Completá la solicitud usando el mismo correo de Google con el que vas a iniciar sesión.
            </p>
          </div>
          {error && (
            <div className="rounded-2xl p-3 mb-4 border"
                 style={{ background: 'rgba(239,68,68,0.1)', borderColor: 'rgba(239,68,68,0.4)' }}>
              <p className="text-red-400 text-sm text-center">{error}</p>
            </div>
          )}
          <button onClick={signInWithGoogle} disabled={loading}
            className="w-full flex items-center justify-center gap-3 font-bold py-4 px-6 rounded-2xl transition-all mb-4 disabled:opacity-50"
            style={{ background: loading ? '#d1d5db' : 'white', color: '#1f2937', cursor: loading ? 'not-allowed' : 'pointer' }}>
            {loading
              ? <div className="w-5 h-5 border-2 border-gray-400 border-t-gray-700 rounded-full animate-spin"></div>
              : <GoogleIcon />}
            {loading ? 'Conectando...' : 'Continuar con Google'}
          </button>
          <a href={GOOGLE_FORM_URL} target="_blank" rel="noopener noreferrer"
            className="w-full flex items-center justify-center gap-2 font-semibold py-4 px-6 rounded-2xl transition-all border text-sm"
            style={{ color: '#5DDADB', borderColor: 'rgba(93,218,219,0.35)', background: 'rgba(93,218,219,0.08)' }}>
            Solicitar acceso al Makers Club 3DBAT →
          </a>
          <p className="text-center text-white/30 text-xs mt-6">
            El acceso será habilitado una vez que el administrador verifique tu membresía.
          </p>
        </AuthCard>
      );
    };

    const StatusScreen = ({ title, message, extra, member, onSignOut, onRecheck }) => (
      <AuthCard>
        <div className="text-center mb-6">
          <p className="text-white text-lg font-bold mb-2">{title}</p>
          <p className="text-white/60 text-sm leading-relaxed">{message}</p>
          {extra && <p className="text-white/40 text-xs mt-3 leading-relaxed">{extra}</p>}
          {member && (
            <div className="mt-4 rounded-xl p-3 text-xs text-white/50"
                 style={{ background: 'rgba(255,255,255,0.04)' }}>
              {member.email}
            </div>
          )}
        </div>
        <div className="flex flex-col gap-3">
          {onRecheck && (
            <button onClick={onRecheck}
              className="w-full py-3 rounded-2xl font-bold text-sm transition-all"
              style={{ background: 'rgba(93,218,219,0.15)', color: '#5DDADB', border: '1px solid rgba(93,218,219,0.3)' }}>
              Volver a comprobar acceso
            </button>
          )}
          <a href={GOOGLE_FORM_URL} target="_blank" rel="noopener noreferrer"
            className="w-full flex items-center justify-center py-3 rounded-2xl font-bold text-sm transition-all"
            style={{ background: 'rgba(52,55,162,0.2)', color: '#a5b4fc', border: '1px solid rgba(52,55,162,0.4)' }}>
            Solicitar acceso
          </a>
          <button onClick={onSignOut}
            className="w-full py-3 rounded-2xl font-bold text-sm text-white/40 hover:text-white/70 transition-all"
            style={{ background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.08)' }}>
            Cerrar sesión
          </button>
        </div>
      </AuthCard>
    );

    // =====================================================================
    // PANEL DE ADMINISTRACIÓN
    // =====================================================================
    const AdminPanel = ({ onSignOut, onGoToCotizador }) => {
      const [members, setMembers]             = useState([]);
      const [loading, setLoading]             = useState(true);
      const [search, setSearch]               = useState('');
      const [filterStatus, setFilterStatus]   = useState('all');
      const [selected, setSelected]           = useState(null);
      const [confirmAction, setConfirmAction] = useState(null);
      const [addForm, setAddForm]             = useState({ open: false, email: '', first_name: '', last_name: '', discord: '', instagram: '', phone: '', notes: '' });
      const [notesEdit, setNotesEdit]         = useState({ open: false, id: null, value: '' });
      const [actionLoading, setActionLoading] = useState(false);
      const [toast, setToast]                 = useState(null);

      const showToast = (msg, ok = true) => {
        setToast({ msg, ok });
        setTimeout(() => setToast(null), 3500);
      };

      const loadMembers = async () => {
        setLoading(true);
        const { data, error } = await sb.rpc('admin_get_all_members');
        if (error) showToast('Error al cargar miembros: ' + error.message, false);
        else setMembers(data || []);
        setLoading(false);
      };

      useEffect(() => { loadMembers(); }, []);

      const doStatusUpdate = async (id, newStatus, notes) => {
        setActionLoading(true);
        const { error } = await sb.rpc('admin_update_member_status', {
          p_member_id: id, p_new_status: newStatus, p_notes: notes || null
        });
        if (error) showToast('Error: ' + error.message, false);
        else {
          showToast('Acción aplicada');
          await loadMembers();
          setSelected(null);
        }
        setActionLoading(false);
        setConfirmAction(null);
      };

      const doAddMember = async () => {
        if (!addForm.email.trim()) return showToast('Ingresá un correo', false);
        setActionLoading(true);
        const { error } = await sb.rpc('admin_add_member', {
          p_email:      addForm.email.trim(),
          p_first_name: addForm.first_name || null,
          p_last_name:  addForm.last_name  || null,
          p_discord:    addForm.discord    || null,
          p_instagram:  addForm.instagram  || null,
          p_phone:      addForm.phone      || null,
          p_notes:      addForm.notes      || null,
        });
        if (error) showToast('Error: ' + error.message, false);
        else {
          showToast('Miembro agregado');
          await loadMembers();
          setAddForm({ open: false, email: '', first_name: '', last_name: '', discord: '', instagram: '', phone: '', notes: '' });
        }
        setActionLoading(false);
      };

      const doUpdateNotes = async () => {
        setActionLoading(true);
        const { error } = await sb.rpc('admin_update_notes', {
          p_member_id: notesEdit.id, p_notes: notesEdit.value
        });
        if (error) showToast('Error: ' + error.message, false);
        else {
          showToast('Notas actualizadas');
          await loadMembers();
          setNotesEdit({ open: false, id: null, value: '' });
        }
        setActionLoading(false);
      };

      const filtered = members.filter(m => {
        const q = search.toLowerCase();
        const matchSearch = !q
          || m.email?.toLowerCase().includes(q)
          || m.first_name?.toLowerCase().includes(q)
          || m.last_name?.toLowerCase().includes(q)
          || m.discord_username?.toLowerCase().includes(q);
        const matchStatus = filterStatus === 'all' || m.status === filterStatus;
        return matchSearch && matchStatus;
      });

      const fmtDate = (d) => d ? new Date(d).toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: '2-digit' }) : '—';

      const ACTIONS = {
        approved:   { label: 'Aprobar',    next: 'approved',  color: '#34D399', bg: 'rgba(52,211,153,0.15)',  border: 'rgba(52,211,153,0.35)' },
        rejected:   { label: 'Rechazar',   next: 'rejected',  color: '#EF4444', bg: 'rgba(239,68,68,0.15)',   border: 'rgba(239,68,68,0.35)' },
        suspended:  { label: 'Suspender',  next: 'suspended', color: '#F97316', bg: 'rgba(249,115,22,0.15)',  border: 'rgba(249,115,22,0.35)' },
        reactivate: { label: 'Reactivar',  next: 'approved',  color: '#5DDADB', bg: 'rgba(93,218,219,0.15)',  border: 'rgba(93,218,219,0.35)' },
        expired:    { label: 'Vencer',     next: 'expired',   color: '#9CA3AF', bg: 'rgba(156,163,175,0.15)', border: 'rgba(156,163,175,0.35)' },
      };

      const actionsFor = (status) => ({
        pending:   ['approved', 'rejected'],
        approved:  ['suspended', 'expired', 'rejected'],
        suspended: ['reactivate', 'rejected'],
        rejected:  ['reactivate'],
        expired:   ['reactivate', 'suspended'],
      }[status] || []);

      const STAT_COLORS = { all: '#5DDADB', pending: '#FBBF24', approved: '#34D399', suspended: '#F97316', rejected: '#EF4444' };
      const STAT_LABELS = { all: 'Total', pending: 'Pendientes', approved: 'Aprobados', suspended: 'Suspendidos', rejected: 'Rechazados' };

      return (
        <div className="min-h-screen" style={{ background: '#131D47' }}>

          {/* Toast */}
          {toast && (
            <div className="fixed top-4 right-4 z-[400] px-5 py-3 rounded-2xl font-bold text-sm shadow-2xl"
                 style={{ background: toast.ok ? '#34D399' : '#EF4444', color: 'white' }}>
              {toast.msg}
            </div>
          )}

          {/* Header */}
          <div className="sticky top-0 z-50 border-b border-white/10"
               style={{ background: 'rgba(19,29,71,0.96)', backdropFilter: 'blur(16px)' }}>
            <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
              <div>
                <h1 className="text-white font-bold text-base leading-tight">Panel Admin</h1>
                <p className="text-white/40 text-xs">Makers Club 3DBAT</p>
              </div>
              <div className="flex gap-2">
                <button onClick={onGoToCotizador}
                  className="px-4 py-2 rounded-xl font-bold text-sm"
                  style={{ background: 'rgba(93,218,219,0.15)', color: '#5DDADB', border: '1px solid rgba(93,218,219,0.3)' }}>
                  Ir al Cotizador
                </button>
                <button onClick={onSignOut}
                  className="px-4 py-2 rounded-xl font-bold text-sm text-white/50"
                  style={{ background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)' }}>
                  Salir
                </button>
              </div>
            </div>
          </div>

          <div className="max-w-5xl mx-auto px-4 py-6">

            {/* Stats */}
            <div className="grid grid-cols-5 gap-2 mb-5">
              {['all','pending','approved','suspended','rejected'].map(s => {
                const count = s === 'all' ? members.length : members.filter(m => m.status === s).length;
                const active = filterStatus === s;
                return (
                  <button key={s} onClick={() => setFilterStatus(s)}
                    className="rounded-2xl p-3 text-center transition-all border"
                    style={{
                      background: active ? `${STAT_COLORS[s]}22` : 'rgba(255,255,255,0.04)',
                      borderColor: active ? `${STAT_COLORS[s]}55` : 'rgba(255,255,255,0.08)',
                    }}>
                    <div className="text-xl font-bold" style={{ color: STAT_COLORS[s] }}>{count}</div>
                    <div className="text-[10px] text-white/50 mt-0.5">{STAT_LABELS[s]}</div>
                  </button>
                );
              })}
            </div>

            {/* Search + Add */}
            <div className="flex gap-2 mb-4">
              <input type="text" placeholder="Buscar por nombre, correo o Discord..."
                value={search} onChange={e => setSearch(e.target.value)}
                className="flex-1 rounded-2xl px-4 py-3 text-sm text-white outline-none"
                style={{ background: 'rgba(255,255,255,0.07)', border: '1px solid rgba(255,255,255,0.1)' }} />
              <button onClick={() => setAddForm(f => ({ ...f, open: true }))}
                className="px-5 py-3 rounded-2xl font-bold text-sm"
                style={{ background: 'rgba(247,142,182,0.15)', color: '#F78EB6', border: '1px solid rgba(247,142,182,0.35)' }}>
                + Agregar
              </button>
            </div>

            {/* List */}
            {loading ? (
              <div className="text-center py-20 text-white/30 text-sm">Cargando miembros...</div>
            ) : filtered.length === 0 ? (
              <div className="text-center py-20 text-white/30 text-sm">Sin resultados</div>
            ) : (
              <div className="space-y-2">
                {filtered.map(m => (
                  <button key={m.id}
                    className="w-full text-left rounded-2xl p-4 border transition-all hover:border-white/20"
                    style={{ background: 'rgba(255,255,255,0.04)', borderColor: 'rgba(255,255,255,0.08)' }}
                    onClick={() => setSelected(m)}>
                    <div className="flex items-center justify-between gap-3">
                      <div className="flex items-center gap-3 min-w-0">
                        <div className="w-9 h-9 rounded-xl flex items-center justify-center font-bold text-sm flex-shrink-0"
                             style={{ background: 'rgba(93,218,219,0.15)', color: '#5DDADB' }}>
                          {(m.first_name?.[0] || m.email?.[0] || '?').toUpperCase()}
                        </div>
                        <div className="min-w-0">
                          <p className="text-white font-semibold text-sm truncate">
                            {[m.first_name, m.last_name].filter(Boolean).join(' ') || 'Sin nombre'}
                          </p>
                          <p className="text-white/40 text-xs truncate">{m.email}</p>
                          {m.discord_username && (
                            <p className="text-xs" style={{ color: 'rgba(88,101,242,0.8)' }}>@{m.discord_username}</p>
                          )}
                        </div>
                      </div>

    const AuthGate = () => {
      const [session, setSession]       = useState(undefined);
      const [member, setMember]         = useState(null);
      const [initialDone, setInitialDone] = useState(false);
      const [adminMode, setAdminMode]   = useState(true);

      const checkAccess = async (sess) => {
        if (!sess) { setMember(null); setInitialDone(true); return; }
        try {
          const { data, error } = await sb.rpc('get_my_access');
          if (error) throw error;
          setMember(data?.[0] || null);
        } catch (err) {
          console.error('[AuthGate]', err);
        } finally {
          setInitialDone(true);
        }
      };

      useEffect(() => {
        sb.auth.getSession().then(({ data: { session: sess } }) => {
          setSession(sess);
          checkAccess(sess);
        });

        const { data: { subscription } } = sb.auth.onAuthStateChange((event, sess) => {
          if (event === 'SIGNED_IN') {
            setSession(sess);
            checkAccess(sess);
          } else if (event === 'SIGNED_OUT') {
            setSession(null);
            setMember(null);
            setInitialDone(true);
          }
          // TOKEN_REFRESHED y otros eventos se ignoran — evita resetear el estado al cambiar de pestaña
        });

        return () => subscription.unsubscribe();
      }, []);

      const signOut = async () => {
        await sb.auth.signOut();
        setSession(null);
        setMember(null);
      };

      if (!initialDone) return <LoadingScreen />;
      if (!session) return <LoginScreen />;

      if (!member) return (
        <StatusScreen
          title="Sin acceso"
          message="Tu cuenta todavía no tiene acceso al Cotizador 3DBAT PRO 2.0."
          extra="Recordá completar el formulario utilizando el mismo correo con el que iniciaste sesión con Google."
          member={session.user}
          onSignOut={signOut}
          onRecheck={() => checkAccess(session)}
        />
      );

      const STATUS_SCREENS = {
        pending: {
          title: 'Solicitud pendiente',
          message: 'Tu solicitud está pendiente de revisión. Vamos a comprobar que tu membresía del Makers Club 3DBAT se encuentre activa.',
        },
        rejected: {
          title: 'Solicitud rechazada',
          message: 'No pudimos validar tu membresía con los datos enviados. Comunicate con la administración del Makers Club 3DBAT.',
        },
        suspended: {
          title: 'Acceso suspendido',
          message: 'Tu acceso al Cotizador 3DBAT PRO 2.0 se encuentra suspendido.',
        },
        expired: {
          title: 'Membresía vencida',
          message: 'Tu membresía del Makers Club 3DBAT se encuentra vencida.',
        },
      };

      if (STATUS_SCREENS[member.status]) {
        const s = STATUS_SCREENS[member.status];
        return (
          <StatusScreen
            title={s.title}
            message={s.message}
            member={member}
            onSignOut={signOut}
            onRecheck={member.status === 'pending' ? () => checkAccess(session) : undefined}
          />
        );
      }

      if (member.status === 'approved') {
        if (member.role === 'admin' && adminMode) {
          return <AdminPanel onSignOut={signOut} onGoToCotizador={() => setAdminMode(false)} />;
        }
        return (
          <div>
            <div className="flex items-center justify-between px-4 py-2 text-xs border-b border-white/10"
                 style={{ background: 'rgba(19,29,71,0.96)', backdropFilter: 'blur(16px)' }}>
              <span className="text-white/40">
                {member.first_name ? `Hola, ${member.first_name}` : member.email}
                {member.role === 'admin' && (
                  <span className="ml-2 font-bold" style={{ color: '#F78EB6' }}>✦ Admin</span>
                )}
              </span>
              <div className="flex items-center gap-4">
                {member.role === 'admin' && (
                  <button onClick={() => setAdminMode(true)}
                    className="font-bold transition-colors" style={{ color: '#5DDADB' }}>
                    Panel Admin
                  </button>
                )}
                <button onClick={signOut} className="text-white/40 hover:text-white/70 font-bold transition-colors">
                  Cerrar sesión
                </button>
              </div>
            </div>
            <App />
          </div>
        );
      }

      return <StatusScreen title="Sin acceso" message="Estado de cuenta no reconocido." onSignOut={signOut} />;
    };

    let sharedAudioCtx = null;
    const getSharedAudioContext = () => {

    };
    let isUiSoundEnabledGlobal = true;
    let lastKeystrokeTime = 0;
    const playHoverSound = () => {
      if (!isUiSoundEnabledGlobal) return;
      try { const ctx = getSharedAudioContext(); if (!ctx) return; const o = ctx.createOscillator(); const g = ctx.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(800, ctx.currentTime); g.gain.setValueAtTime(0, ctx.currentTime); g.gain.linearRampToValueAtTime(0.05, ctx.currentTime + 0.01); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.1); } catch (e) { }
    };
    const playKeystrokeSound = () => {
      if (!isUiSoundEnabledGlobal) return;
      const now = Date.now(); if (now - lastKeystrokeTime < 60) return; lastKeystrokeTime = now;

utton><button onClick={handleSaveBusinessData} className={`text-[10px] font-bold px-2 py-1 rounded-lg transition-all flex items-center gap-1 ${isBusinessDataSaved ? 'bg-green-500 text-white' : 'bg-brand-indigo/10 text-brand-indigo hover:bg-brand-indigo/20'}`} title="Guardar como plantilla fija">{isBusinessDataSaved ? <Check size={10} /> : <Save size={10} />} {isBusinessDataSaved ? '¡Guardado!' : 'Fijar Datos'}</button></div></div><div className="space-y-3"><div><label className={`block text-xs font-bold mb-1 ml-1 ${theme.textMain}`}>{t.lbl_issuer_name}</label><input type="text" value={issuerName} onChange={(e) => setIssuerName(e.target.value)} placeholder={t.ph_brand} className={`w-full p-3 rounded-xl text-sm border focus:ring-2 outline-none ${theme.input}`} /></div><div><label className={`block text-xs font-bold mb-1 ml-1 ${theme.textMain}`}>{t.lbl_issuer_contact}</label><input type="text" value={issuerContact} onChange={(e) => setIssuerContact(e.target.value)} placeholder={t.ph_contact} className={`w-full p-3 rounded-xl text-sm border focus:ring-2 outline-none ${theme.input}`} /></div><div><label className={`block text-xs font-bold mb-1 ml-1 ${theme.textMain}`}>{t.lbl_issuer_social}</label><input type="text" value={issuerSocial} onChange={(e) => setIssuerSocial(e.target.value)} placeholder={t.ph_social} className={`w-full p-3 rounded-xl text-sm border focus:ring-2 outline-none ${theme.input}`} /></div><div><label className={`block text-xs font-bold mb-1 ml-1 ${theme.textMain}`}>{t.lbl_issuer_location}</label><input type="text" value={issuerLocation} onChange={(e) => setIssuerLocation(e.target.value)} placeholder={t.ph_location} className={`w-full p-3 rounded-xl text-sm border focus:ring-2 outline-none ${theme.input}`} /></div><div><label className={`block text-xs font-bold mb-1 ml-1 ${theme.textMain}`}>Datos de Pago (CBU/Alias/PayPal)</label><input type="text" value={issuerPayment} onChange={(e) => setIssuerPayment(e.target.value)} placeholder="Alias: mi.cuenta.3d" className={`w-full p-3 rounded-xl text-sm border focus:ring-2 outline-none ${theme.input}`} /></div></div></div>

        {/* SECCIÓN DE VALOR PERSONALIZADO */}
        <div className="mt-6 pt-6 border-t border-dashed border-current/10">
          <h3 className={`text-xs font-bold uppercase tracking-wider mb-3 flex items-center gap-2 ${theme.textSecondary}`}>🔧 VALOR TOTAL PERSONALIZADO</h3>
          <div className="space-y-2">
            <div className="relative">
              <div className={`absolute left-3 top-1/2 -translate-y-1/2 ${theme.textSecondary} font-bold`}>{currencySymbol}</div>
              <input
                type="number"
                value={customTotal}
                onChange={(e) => setCustomTotal(e.target.value)}
                placeholder={originalTotalPrice.toString()}
                className={`w-full p-3 pl-10 rounded-xl text-sm border focus:ring-2 outline-none font-bold ${theme.input}`}
              />
            </div>
            <p className={`text-[10px] leading-relaxed opacity-70 ${theme.textSecondary}`}>
              💬 “Usá este campo si querés reemplazar el valor total calculado por uno propio. Al modificarlo, todo el desglose se actualiza automáticamente.”
            </p>
          </div>
        </div>

      </div></div><div className={`w-full md:w-2/3 p-8 overflow-y-auto flex flex-col items-center justify-start gap-8 ${theme.name === 'Claro' ? 'bg-slate-200' : 'bg-black/40'}`}><div ref={budgetRef} className="w-full max-w-[210mm] shadow-2xl transition-all duration-300 relative text-left bg-white" style={{ backgroundColor: bgColor, color: textColor }}><div className="p-8 pb-12 flex flex-col relative font-sans" style={{ borderColor: accentColor, border: `1px solid ${accentColor}20` }}>
          {/* Marca de Agua */}
          {showWatermark && (
            <div className="absolute inset-0 flex flex-wrap items-center justify-center gap-20 pointer-events-none select-none z-0 overflow-hidden" style={{ opacity: 0.07 }}>
              {[...Array(12)].map((_, i) => (
                <div key={i} className="text-7xl font-black uppercase tracking-tighter text-center whitespace-nowrap leading-none" style={{ transform: 'rotate(-25deg)', color: accentColor }}>
                  {issuerName || "3DBAT"}
                </div>
              ))}
            </div>
          )}
          <div className="flex justify-between items-start mb-6 pb-4 border-b relative z-10" style={{ borderColor: accentColor }}><div className="flex flex-col gap-1"><h1 className="text-4xl font-black tracking-tighter uppercase mb-2" style={{ color: accentColor }}>{issuerName}</h1>
              <div className="space-y-1 text-sm font-bold opacity-90">{issuerContact && (<div className="flex items-center gap-2">📞 {issuerContact}</div>)}{issuerSocial && (<div className="flex items-center gap-2">🔗 {issuerSocial}</div>)}{issuerLocation && (<div className="flex items-center gap-2">📍 {issuerLocation}</div>)}</div></div><div className="text-right text-xs font-bold opacity-80 leading-loose"><div>{t.pdf_date} {displayDate(date)}</div><div>{t.pdf_valid} {displayDate(validUntil)}</div></div></div><div className="rounded-2xl p-6 mb-6 border" style={{ backgroundColor: `${textColor}08`, borderColor: `${accentColor}40` }}><div className="flex justify-between items-end"><div><div className="text-4xl font-bold leading-none mb-2 min-h-[40px]">{clientName}</div></div><div className="text-right"><div className="text-sm opacity-80 uppercase tracking-widest font-bold">{projectDesc || "ITEM"}</div></div></div></div><div className="flex w-full text-[10px] font-bold uppercase tracking-widest mb-4 opacity-60 border-b pb-2" style={{ borderColor: accentColor }}><div className="flex-1 pl-2">{t.pdf_desc_col}</div><div className="w-24 text-center">{t.pdf_qty_col}</div><div className="w-24 text-right pr-2">{t.pdf_total_col}</div></div><div className="flex w-full items-center text-sm font-bold py-4 border-b border-dashed" style={{ borderColor: `${accentColor}50` }}><div className="flex-1 pl-2"><div className="uppercase tracking-wide text-base mb-1">{projectDesc || "ITEM"}</div><div className="text-[10px] opacity-60 font-medium tracking-wide">{itemDetail}</div></div><div className="w-24 text-center opacity-100 text-lg">{quantity}</div><div className="w-24 text-right pr-2 flex justify-end"><span className="whitespace-nowrap flex items-center gap-1 text-lg">{currencySymbol} {formatCurrency(effectiveTotal)}</span></div></div><div className="mt-6 pt-6 flex justify-between items-end gap-12">
                <div className="flex-1 pb-2">
                  <div className="text-[10px] font-medium opacity-80 leading-relaxed">
                    <ul className="list-none space-y-1">
                      <li>{t.pdf_term_1} {validDays} {t.pdf_term_1_suffix}</li>
                      <li>{t.pdf_term_2}</li>
                    </ul>
                  </div>
                </div>
                <div className="w-1/2 space-y-4">
                  <div className="flex justify-between text-sm font-bold opacity-80"><span>{t.pdf_subtotal}</span><span className="whitespace-nowrap">{currencySymbol} {formatCurrency(effectiveTotal)}</span></div>
                  <div className="flex justify-between text-sm font-bold opacity-80 border-b pb-4" style={{ borderColor: accentColor }}><span>{t.pdf_deposit_row}</span><span className="whitespace-nowrap">{currencySymbol} {formatCurrency(depositAmount)}</span></div>
                  
                  {issuerPayment ? (
                    <div className="mt-4 mb-2 p-4 rounded-xl border-2 border-dashed flex flex-col gap-3" style={{ borderColor: `${accentColor}60`, backgroundColor: `${accentColor}10` }}>
                      <div>
                        <div className="text-[9px] font-black uppercase tracking-widest opacity-70">ALIAS / CBU / PAYPAL:</div>
                        <div className="text-sm font-bold tracking-tight">{issuerPayment}</div>
                      </div>
                      <div className="pt-3 border-t border-dashed flex justify-between items-end" style={{ borderColor: `${accentColor}30` }}>
                        <span className="text-xs font-bold uppercase tracking-widest">{t.pdf_total_final}</span>
                        <span className="text-4xl font-black tracking-tight flex items-baseline gap-1">
                          <span className="text-lg opacity-60 font-bold">{currencySymbol}</span>{formatCurrency(effectiveTotal)}
                        </span>
                      </div>
                    </div>
                  ) : (
                    <div className="flex justify-between items-end pt-4 border-t" style={{ borderColor: accentColor }}>
                      <span className="text-base font-bold uppercase tracking-widest mb-1">{t.pdf_total_final}</span>
                      <span className="text-5xl font-black tracking-tight flex items-baseline gap-2"><span className="text-2xl opacity-60 font-bold">{currencySymbol}</span>{formatCurrency(effectiveTotal)}</span>
                    </div>
                  )}
                </div>
              </div>
          
          <div className="mt-12 pt-4 border-t" style={{ borderColor: accentColor }}></div>
          
        </div></div><div className={`flex flex-wrap justify-center items-center gap-8 p-4 rounded-2xl shadow-xl border ${theme.name === 'Claro' ? 'bg-white border-slate-200' : 'bg-brand-dark border-white/10'}`}><div className="flex items-center gap-8"><div className={`hidden md:flex items-center gap-3`}><div className={`p-2 rounded-full ${theme.name === 'Claro' ? 'bg-slate-100 text-slate-500' : 'bg-white/5 text-slate-400'}`}><Palette size={18} /></div></div><div className="flex gap-8 items-center"><div className="flex flex-col items-center gap-2"><label className={`text-[9px] font-bold uppercase opacity-70 whitespace-nowrap ${theme.textMain}`}>{t.ctl_bg}</label><div className="relative overflow-hidden w-8 h-8 rounded-full shadow-sm ring-1 ring-black/10 cursor-pointer hover:scale-110 transition-transform"><input type="color" value={bgColor} onChange={(e) => setBgColor(e.target.value)} className="absolute -top-2 -left-2 w-16 h-16 cursor-pointer opacity-0" /><div className="w-full h-full" style={{ backgroundColor: bgColor }}></div></div></div><div className="flex flex-col items-center gap-2"><label className={`text-[9px] font-bold uppercase opacity-70 whitespace-nowrap ${theme.textMain}`}>{t.ctl_text}</label><div className="relative overflow-hidden w-8 h-8 rounded-full shadow-sm ring-1 ring-black/10 cursor-pointer hover:scale-110 transition-transform"><input type="color" value={textColor} onChange={(e) => setTextColor(e.target.value)} className="absolute -top-2 -left-2 w-16 h-16 cursor-pointer opacity-0" /><div className="w-full h-full" style={{ backgroundColor: textColor }}></div></div></div><div className="flex flex-col items-center gap-2"><label className={`text-[9px] font-bold uppercase opacity-70 whitespace-nowrap ${theme.textMain}`}>{t.ctl_accent}</label><div className="relative overflow-hidden w-8 h-8 rounded-full shadow-sm ring-1 ring-black/10 cursor-pointer hover:scale-110 transition-transform"><input type="color" value={accentColor} onChange={(e) => setAccentColor(e.target.value)} className="absolute -top-2 -left-2 w-16 h-16 cursor-pointer opacity-0" /><div className="w-full h-full" style={{ backgroundColor: accentColor }}></div></div></div><div className="flex flex-col items-center gap-2"><label className={`text-[9px] font-bold uppercase opacity-70 whitespace-nowrap ${theme.textMain}`}>Marca de Agua</label><button onClick={() => setShowWatermark(!showWatermark)} className={`w-8 h-8 rounded-full flex items-center justify-center transition-all border ${showWatermark ? 'bg-brand-cyan text-brand-dark border-brand-cyan shadow-lg shadow-brand-cyan/30' : (theme.name === 'Claro' ? 'bg-slate-100 text-slate-400 border-slate-200' : 'bg-white/5 text-slate-500 border-white/10')}`} title="Toggle Marca de Agua">{showWatermark ? <BadgeCheck size={16} /> : <div className="w-4 h-4 rounded-full border-2 border-current opacity-30" />}</button></div><button onClick={handleExportPNG} className="p-3 rounded-xl bg-brand-cyan text-brand-dark shadow-lg hover:bg-brand-cyan/80 hover:scale-105 transition-all" title="Descargar PNG"><Image size={20} /></button><div className="h-8 w-px bg-current opacity-10 mx-2"></div><button onClick={handleResetColors} className="p-3 rounded-xl bg-slate-800 text-white shadow-lg hover:bg-slate-700 hover:scale-105 transition-all" title="Resetear Colores (B&N)"><RotateCcw size={20} /></button></div></div></div></div></div></div>
      );
    };

    const ESTADOS_PEDIDO = [
      { label: 'Pendiente de confirmar', color: 'text-slate-400 bg-slate-400/10 border-slate-400/30' },
      { label: 'Pendiente de seña', color: 'text-yellow-400 bg-yellow-400/10 border-yellow-400/30' },
      { label: 'Señado', color: 'text-blue-400 bg-blue-400/10 border-blue-400/30' },
      { label: 'En diseño', color: 'text-purple-400 bg-purple-400/10 border-purple-400/30' },
      { label: 'En producción', color: 'text-orange-400 bg-orange-400/10 border-orange-400/30' },
      { label: 'Listo para retirar/enviar', color: 'text-brand-cyan bg-brand-cyan/10 border-brand-cyan/30' },
      { label: 'Entregado', color: 'text-green-400 bg-green-400/10 border-green-400/30' },
      { label: 'Cancelado', color: 'text-red-400 bg-red-400/10 border-red-400/30' },
    ];

    const pedidoVacio = () => ({
      id: Date.now().toString(),
      numeroPedido: 'PED-' + String(Date.now()).slice(-6),
      fechaCreacion: new Date().toISOString().split('T')[0],
      cliente: { nombre: '', telefono: '', instagram: '', email: '' },
      trabajo: { titulo: '', descripcion: '', cantidad: 1, material: '', color: '', impresora: '', tiempoEstimado: '', gramosEstimados: 0, archivoReferencia: '', observaciones: '' },
      economia: { costoTotal: 0, requiereSenia: false, montoSeniaRequerida: 0, montoAbonado: 0, saldoPendiente: 0, medioPago: 'Efectivo', estadoPago: 'Sin pagar' },
      estado: 'Pendiente de confirmar',
      fechaEstimadaEntrega: '',
      fechaEntregaReal: '',
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
    });

    const PedidosProModule = ({ pedidos, savePedidos, pedidoView, setPedidoView, selectedPedido, setSelectedPedido, pedidoFilter, setPedidoFilter, pedidoSearch, setPedidoSearch, theme, currentThemeMode, currency, formatCurrency }) => {
      const currencySymbol = currency === 'ARS' ? '$' : 'U$D';

      const getEstadoColor = (estado) => {
        const e = ESTADOS_PEDIDO.find(x => x.label === estado);
        return e ? e.color : 'text-slate-400 bg-slate-400/10 border-slate-400/30';
      };

      const getPagoColor = (estadoPago) => {
        if (estadoPago === 'Pagado') return 'text-green-400 bg-green-400/10 border-green-400/30';
        if (estadoPago === 'Parcial') return 'text-yellow-400 bg-yellow-400/10 border-yellow-400/30';
        return 'text-red-400 bg-red-400/10 border-red-400/30';
      };

      const filteredPedidos = pedidos.filter(p => {
        const matchFilter = pedidoFilter === 'Todos' || p.estado === pedidoFilter;
        const q = pedidoSearch.toLowerCase();
        const matchSearch = !q || p.cliente.nombre.toLowerCase().includes(q) || p.cliente.telefono.toLowerCase().includes(q) || p.numeroPedido.toLowerCase().includes(q) || p.trabajo.titulo.toLowerCase().includes(q);
        return matchFilter && matchSearch;
      });

      const handleNuevoPedido = () => { setSelectedPedido(null); setPedidoView('form'); };
      const handleEditarPedido = (p) => { setSelectedPedido(p); setPedidoView('form'); };
      const handleVerDetalle = (p) => { setSelectedPedido(p); setPedidoView('detail'); };
      const handleVolver = () => { setSelectedPedido(null); setPedidoView('list'); };

      const handleGuardarPedido = (pedidoData) => {
        const exists = pedidos.find(p => p.id === pedidoData.id);
        let nuevos;
        if (exists) {
          nuevos = pedidos.map(p => p.id === pedidoData.id ? { ...pedidoData, updatedAt: new Date().toISOString() } : p);
        } else {
          nuevos = [{ ...pedidoData, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() }, ...pedidos];
        }
        savePedidos(nuevos);
        setSelectedPedido(null);
        setPedidoView('list');
      };

      const handleEliminarPedido = (id) => {
        savePedidos(pedidos.filter(p => p.id !== id));
        setPedidoView('list');
        setSelectedPedido(null);
      };

      const handleCambiarEstado = (id, nuevoEstado) => {
        const nuevos = pedidos.map(p => p.id === id ? { ...p, estado: nuevoEstado, updatedAt: new Date().toISOString() } : p);
        savePedidos(nuevos);
        if (selectedPedido && selectedPedido.id === id) setSelectedPedido(nuevos.find(p => p.id === id));
      };

      const handleRegistrarPago = (id, montoPagar) => {
        const nuevos = pedidos.map(p => {
          if (p.id !== id) return p;
          const nuevoAbonado = Math.min(p.economia.montoAbonado + montoPagar, p.economia.costoTotal);
          const saldo = p.economia.costoTotal - nuevoAbonado;
          const estadoPago = nuevoAbonado === 0 ? 'Sin pagar' : nuevoAbonado >= p.economia.costoTotal ? 'Pagado' : 'Parcial';
          return { ...p, economia: { ...p.economia, montoAbonado: nuevoAbonado, saldoPendiente: saldo, estadoPago }, updatedAt: new Date().toISOString() };
        });
        savePedidos(nuevos);
        if (selectedPedido && selectedPedido.id === id) setSelectedPedido(nuevos.find(p => p.id === id));
      };

      if (pedidoView === 'form') {
        return <PedidoForm pedido={selectedPedido} onGuardar={handleGuardarPedido} onCancelar={handleVolver} theme={theme} currentThemeMode={currentThemeMode} currencySymbol={currencySymbol} formatCurrency={formatCurrency} />;
      }
      if (pedidoView === 'detail' && selectedPedido) {
        return <PedidoDetail pedido={selectedPedido} onEditar={() => handleEditarPedido(selectedPedido)} onVolver={handleVolver} onEliminar={handleEliminarPedido} onCambiarEstado={handleCambiarEstado} onRegistrarPago={handleRegistrarPago} getEstadoColor={getEstadoColor} getPagoColor={getPagoColor} theme={theme} currentThemeMode={currentThemeMode} currencySymbol={currencySymbol} formatCurrency={formatCurrency} />;
      }

      return (
        <div className="max-w-5xl mx-auto">
          <div className="flex items-center justify-between mb-6">
            <div>
              <h2 className={`text-2xl font-black ${theme.textMain}`}>📦 Pedidos Pro</h2>
              <p className={`text-sm ${theme.textSecondary}`}>{pedidos.length} pedido{pedidos.length !== 1 ? 's' : ''} registrado{pedidos.length !== 1 ? 's' : ''}</p>
            </div>
            <button onClick={handleNuevoPedido} className="flex items-center gap-2 px-5 py-2.5 rounded-2xl font-bold text-sm bg-brand-pink text-white shadow-lg shadow-brand-pink/30 hover:brightness-110 hover:scale-105 transition-all">
              <Plus size={16} /> Nuevo Pedido
            </button>
          </div>

          <div className="relative mb-4">
            <input
              type="text"
              value={pedidoSearch}
              onChange={e => setPedidoSearch(e.target.value)}
              placeholder="Buscar por cliente, teléfono, número de pedido o trabajo..."
              className={`w-full rounded-2xl py-3 pl-5 pr-10 font-medium focus:outline-none focus:ring-2 focus:ring-brand-pink/40 ${theme.input}`}
            />
            {pedidoSearch && <button onClick={() => setPedidoSearch('')} className={`absolute right-4 top-1/2 -translate-y-1/2 ${theme.textSecondary} hover:text-red-400`}><X size={16} /></button>}
          </div>

          <div className="flex gap-2 mb-6 overflow-x-auto pb-1">
            {['Todos', ...ESTADOS_PEDIDO.map(e => e.label)].map(f => (
              <button key={f} onClick={() => setPedidoFilter(f)} className={`px-3 py-1.5 rounded-xl text-xs font-bold whitespace-nowrap border transition-all ${pedidoFilter === f ? theme.buttonActive : theme.buttonInactive}`}>{f}</button>
            ))}
          </div>

          {filteredPedidos.length === 0 ? (
            <div className={`${theme.card} rounded-3xl p-16 text-center`}>
              <div className="text-5xl mb-4">📭</div>
              <p className={`text-lg font-bold mb-2 ${theme.textMain}`}>{pedidos.length === 0 ? 'No hay pedidos todavía' : 'Sin resultados'}</p>
              <p className={`text-sm mb-6 ${theme.textSecondary}`}>{pedidos.length === 0 ? 'Creá tu primer pedido para empezar.' : 'Probá con otro filtro o búsqueda.'}</p>
              {pedidos.length === 0 && <button onClick={handleNuevoPedido} className="px-6 py-2.5 rounded-2xl font-bold text-sm bg-brand-pink text-white shadow-lg shadow-brand-pink/30 hover:brightness-110 transition-all"><Plus size={14} className="inline mr-1" />Crear primer pedido</button>}
            </div>

    const PedidoForm = ({ pedido, onGuardar, onCancelar, theme, currentThemeMode, currencySymbol, formatCurrency }) => {
      const isEditing = !!pedido;
      const [form, setForm] = useState(() => pedido ? JSON.parse(JSON.stringify(pedido)) : pedidoVacio());
      const [errors, setErrors] = useState({});

      const setCliente = (k, v) => setForm(f => ({ ...f, cliente: { ...f.cliente, [k]: v } }));
      const setTrabajo = (k, v) => setForm(f => ({ ...f, trabajo: { ...f.trabajo, [k]: v } }));
      const setEconomia = (k, v) => setForm(f => {
        const eco = { ...f.economia, [k]: v };
        const saldo = Math.max(0, (eco.costoTotal || 0) - (eco.montoAbonado || 0));
        const ep = (eco.montoAbonado || 0) === 0 ? 'Sin pagar' : (eco.montoAbonado || 0) >= (eco.costoTotal || 0) ? 'Pagado' : 'Parcial';
        return { ...f, economia: { ...eco, saldoPendiente: saldo, estadoPago: ep } };
      });

      const validate = () => {
        const e = {};
        if (!form.cliente.nombre.trim()) e.nombre = 'El nombre es obligatorio';
        if (!form.trabajo.titulo.trim()) e.titulo = 'El trabajo es obligatorio';
        if (form.economia.costoTotal < 0) e.costo = 'El costo no puede ser negativo';
        if (form.economia.montoAbonado < 0) e.abonado = 'El monto no puede ser negativo';
        setErrors(e);
        return Object.keys(e).length === 0;
      };

      const handleGuardar = () => { if (validate()) onGuardar(form); };

      const inputClass = `w-full rounded-2xl py-3 px-4 font-bold focus:outline-none focus:ring-2 focus:ring-brand-pink/40 ${theme.input}`;

      return (

          </div>

          <div className="space-y-6">
            <div className={`${theme.card} rounded-3xl p-6`}>
              {sectionTitle('👤 Cliente')}
              <div className="grid grid-cols-1 gap-4">
                <div>
                  <label className={labelClass}>Nombre del Cliente *</label>
                  <input value={form.cliente.nombre} onChange={e => setCliente('nombre', e.target.value)} placeholder="Ej: Juan Pérez" className={inputClass} />

                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className={labelClass}>Teléfono / WhatsApp</label>

                    <label className={labelClass}>Instagram</label>
                    <input value={form.cliente.instagram} onChange={e => setCliente('instagram', e.target.value)} placeholder="@usuario" className={inputClass} />
                  </div>
                </div>
                <div>
                  <label className={labelClass}>Email (opcional)</label>
                  <input value={form.cliente.email} onChange={e => setCliente('email', e.target.value)} placeholder="email@ejemplo.com" className={inputClass} />

                </div>
                <div>
                  <label className={labelClass}>Descripción</label>

                  <div>
                    <label className={labelClass}>Color</label>
                    <input value={form.trabajo.color} onChange={e => setTrabajo('color', e.target.value)} placeholder="Rojo, Azul..." className={inputClass} />
                  </div>
                </div>
                <div>
                  <label className={labelClass}>Observaciones internas</label>
                  <textarea value={form.trabajo.observaciones} onChange={e => setTrabajo('observaciones', e.target.value)} placeholder="Notas internas..." rows={2} className={`${inputClass} resize-none`} />
                </div>

            </div>

            <div className={`${theme.card} rounded-3xl p-6`}>
              {sectionTitle('💰 Economía')}
              <div className="space-y-4">
                <div>
                  <label className={labelClass}>Costo Total *</label>
                  <div className="relative">
                    <span className={`absolute left-4 top-1/2 -translate-y-1/2 font-bold text-sm text-brand-pink`}>{currencySymbol}</span>

                  </button>
                  <label className={`text-sm font-bold cursor-pointer ${theme.textMain}`} onClick={() => setEconomia('requiereSenia', !form.economia.requiereSenia)}>¿Requiere seña?</label>

                <div>
                  <label className={labelClass}>Monto abonado</label>

                    <input type="number" value={form.economia.montoAbonado || ''} onChange={e => setEconomia('montoAbonado', parseFloat(e.target.value)||0)} onFocus={e=>e.target.select()} placeholder="0" className={`${inputClass} pl-10`} />
                  </div>
                  {errors.abonado && <p className="text-red-400 text-xs mt-1 ml-1">{errors.abonado}</p>}
                  {form.economia.montoAbonado > form.economia.costoTotal && <p className="text-yellow-400 text-xs mt-1 ml-1">⚠️ El monto abonado supera el costo total</p>}
                </div>

                <div>
                  <label className={labelClass}>Medio de pago</label>
                  <select value={form.economia.medioPago} onChange={e => setEconomia('medioPago', e.target.value)} className={inputClass}>
                    {['Efectivo','Transferencia','Mercado Pago','Tarjeta','Otro'].map(m => <option key={m} value={m}>{m}</option>)}
                  </select>
                </div>

                <div className={`p-4 rounded-2xl border flex justify-between items-center ${currentThemeMode === 'light' ? 'bg-slate-50 border-slate-200' : 'bg-brand-dark/40 border-brand-indigo/40'}`}>
                  <span className={`text-sm font-bold ${theme.textSecondary}`}>Saldo pendiente (calculado)</span>
                  <span className={`text-xl font-black ${form.economia.saldoPendiente > 0 ? 'text-red-400' : 'text-green-400'}`}>{currencySymbol}{formatCurrency(form.economia.saldoPendiente)}</span>
                </div>
              </div>
            </div>

            <div className={`${theme.card} rounded-3xl p-6`}>
              {sectionTitle('📅 Fechas y Estado')}
              <div className="space-y-4">
                <div>
                  <label className={labelClass}>Estado del pedido</label>
                  <select value={form.estado} onChange={e => setForm(f => ({ ...f, estado: e.target.value }))} className={inputClass}>
                    {ESTADOS_PEDIDO.map(e => <option key={e.label} value={e.label}>{e.label}</option>)}
                  </select>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className={labelClass}>Fecha estimada de entrega</label>
                    <input type="date" value={form.fechaEstimadaEntrega} onChange={e => setForm(f => ({ ...f, fechaEstimadaEntrega: e.target.value }))} className={inputClass} />
                  </div>
                  <div>
                    <label className={labelClass}>Fecha real de entrega</label>
                    <input type="date" value={form.fechaEntregaReal} onChange={e => setForm(f => ({ ...f, fechaEntregaReal: e.target.value }))} className={inputClass} />
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="flex gap-3 mt-6 mb-10">
            <button onClick={handleGuardar} className="flex-1 py-3 rounded-2xl font-bold text-sm bg-brand-pink text-white shadow-lg shadow-brand-pink/30 hover:brightness-110 transition-all">
              {isEditing ? '💾 Guardar Cambios' : '✅ Crear Pedido'}
            </button>
            <button onClick={onCancelar} className={`px-6 py-3 rounded-2xl font-bold text-sm border transition-all ${theme.buttonInactive}`}>Cancelar</button>
          </div>
        </div>
      );
    };

    const PedidoDetail = ({ pedido, onEditar, onVolver, onEliminar, onCambiarEstado, onRegistrarPago, getEstadoColor, getPagoColor, theme, currentThemeMode, currencySymbol, formatCurrency }) => {
      const [montoPago, setMontoPago] = useState(0);
      const [copiedMsg, setCopiedMsg] = useState('');
      const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);

      const copyMsg = (tipo) => {
        const { nombre } = pedido.cliente;
        const { titulo } = pedido.trabajo;
        const { costoTotal, montoAbonado, saldoPendiente, montoSeniaRequerida } = pedido.economia;
        const fmt = (v) => v.toLocaleString('es-AR', { minimumFractionDigits: 0 });
        const sym = currencySymbol;
        let msg = '';
        if (tipo === 'senia') {
          msg = `Hola ${nombre}! Te confirmo que tu pedido quedó señado ✅\n\n📦 Trabajo: ${titulo}\n💰 Total: ${sym}${fmt(costoTotal)}\n✅ Abonado: ${sym}${fmt(montoAbonado)}\n⏳ Saldo pendiente: ${sym}${fmt(saldoPendiente)}\n\nTe aviso cuando esté listo para retirar/enviar.`;
        } else if (tipo === 'listo') {
          msg = `Hola ${nombre}! Tu pedido ya está listo ✅\n\n📦 Trabajo: ${titulo}\n⏳ Saldo pendiente: ${sym}${fmt(saldoPendiente)}\n\nCoordinamos retiro/envío cuando quieras. 😊`;
        } else if (tipo === 'pedirSenia') {
          msg = `Hola ${nombre}! Para avanzar con tu pedido necesito que abones la seña de ${sym}${fmt(montoSeniaRequerida || Math.round(costoTotal * 0.5))} 🙏\n\n📦 Trabajo: ${titulo}\n💰 Total: ${sym}${fmt(costoTotal)}\n\nUna vez abonada paso el pedido a producción. ✅`;
        }
        navigator.clipboard.writeText(msg).then(() => { setCopiedMsg(tipo); setTimeout(() => setCopiedMsg(''), 2000); });
      };

      const isLight = currentThemeMode === 'light';
      const cardClass = `${theme.card} rounded-3xl p-5 border ${theme.border}`;
      const sectionTitle = (txt) => <h3 className={`text-xs font-black uppercase tracking-wider mb-3 ${theme.accent}`}>{txt}</h3>;
      const row = (label, value) => value ? (
        <div className="flex justify-between items-start py-1.5 border-b border-current/5 last:border-0">
          <span className={`text-xs ${theme.textSecondary}`}>{label}</span>
          <span className={`text-xs font-bold text-right max-w-[60%] ${theme.textMain}`}>{value}</span>
        </div>
      ) : null;

      return (
        <div className="max-w-3xl mx-auto">
          <div className="flex items-center justify-between mb-6 flex-wrap gap-3">

              <div className="flex items-center gap-2 mb-1 flex-wrap">
                <span className={`text-lg font-black ${theme.textMain}`}>{pedido.numeroPedido}</span>
                <span className={`text-xs font-bold px-3 py-1 rounded-full border ${getEstadoColor(pedido.estado)}`}>{pedido.estado}</span>
              </div>
              <p className={`text-sm ${theme.textSecondary}`}>{pedido.cliente.nombre} · {pedido.fechaCreacion}</p>

            <div className="flex gap-2">
              <button onClick={onVolver} className={`px-4 py-2 rounded-xl text-sm font-bold border transition-all ${theme.buttonInactive}`}>← Volver</button>
              <button onClick={onEditar} className={`px-4 py-2 rounded-xl text-sm font-bold border transition-all ${theme.buttonActive}`}>✏️ Editar</button>
              <button onClick={() => setShowDeleteConfirm(true)} className="px-4 py-2 rounded-xl text-sm font-bold border border-red-500/30 text-red-400 hover:bg-red-500/10 transition-all">🗑️</button>
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div className={cardClass}>
              {sectionTitle('👤 Cliente')}

              {row('Instagram', pedido.cliente.instagram)}
              {row('Email', pedido.cliente.email)}

            <div className={cardClass}>
              {sectionTitle('🔧 Trabajo')}
              {row('Trabajo', pedido.trabajo.titulo)}
              {row('Descripción', pedido.trabajo.descripcion)}

              {row('Material', pedido.trabajo.material)}
              {row('Color', pedido.trabajo.color)}
              {row('Observaciones', pedido.trabajo.observaciones)}
            </div>

            <div className={cardClass}>
              {sectionTitle('💰 Economía')}
              {row('Costo total', `${currencySymbol}${formatCurrency(pedido.economia.costoTotal)}`)}

              <div className="flex justify-between items-center py-1.5">

    const App = () => {

      const [currentThemeMode, setCurrentThemeMode] = useState(() => {

        // Convertir a RGB
        const r = parseInt(hexcolor.substr(1, 2), 16);
        const g = parseInt(hexcolor.substr(3, 2), 16);
        const b = parseInt(hexcolor.substr(5, 2), 16);

        const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;

        const updatedQuotes = savedQuotes.map(q => q.id === id ? { ...q, status: newStatus } : q);
        setSavedQuotes(updatedQuotes);
        localStorage.setItem('saved_quotes', JSON.stringify(updatedQuotes));
      };


      // Funciones para modo de color personalizable
      const hslToHex = (h, s, l) => {
        s /= 100;
        l /= 100;
        const c = (1 - Math.abs(2 * l - 1)) * s;
        const x = c * (1 - Math.abs((h / 60) % 2 - 1));
        const m = l - c / 2;
        let r = 0, g = 0, b = 0;
        if (0 <= h && h < 60) { r = c; g = x; b = 0; }
        else if (60 <= h && h < 120) { r = x; g = c; b = 0; }
        else if (120 <= h && h < 180) { r = 0; g = c; b = x; }
        else if (180 <= h && h < 240) { r = 0; g = x; b = c; }
        else if (240 <= h && h < 300) { r = x; g = 0; b = c; }
        else if (300 <= h && h < 360) { r = c; g = 0; b = x; }
        const toHex = (n) => {
          const hex = Math.round((n + m) * 255).toString(16);
          return hex.length === 1 ? '0' + hex : hex;
        };
        return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
      };

      const generateRandomPalette = () => {
        const hue = Math.floor(Math.random() * 360);
        const schemes = ['complementary', 'analogous', 'triadic'];
        const scheme = schemes[Math.floor(Math.random() * schemes.length)];

        let hues = [];
        if (scheme === 'complementary') {
          hues = [hue, (hue + 180) % 360, (hue + 30) % 360];
        } else if (scheme === 'analogous') {
          hues = [hue, (hue + 30) % 360, (hue + 60) % 360];
        } else { // triadic
          hues = [hue, (hue + 120) % 360, (hue + 240) % 360];
        }

        const newColors = {
          primary: hslToHex(hues[0], 65, 45),
          secondary: hslToHex(hues[1], 75, 65),
          accent: hslToHex(hues[2], 70, 55)
        };

        setCustomColors(newColors);
        playSuccessSound();
      };

      const saveCustomColors = (colors) => {
        localStorage.setItem('custom_theme_colors', JSON.stringify(colors));
      };

      useEffect(() => {
        if (currentThemeMode === 'custom') {
          saveCustomColors(customColors);
        }
      }, [customColors, currentThemeMode]);

      useEffect(() => {
        localStorage.setItem('current_theme_mode', currentThemeMode);
      }, [currentThemeMode]);

      const toggleCurrency = async () => { 
        const nc = currency === 'ARS' ? 'USD' : 'ARS'; 
        let rate = exchangeRate; 
        if (nc === 'USD') { 
          setIsRateLoading(true); 
          try { 
            const res = await fetch('https://dolarapi.com/v1/dolares/blue'); 
            const data = await res.json(); 
            if (data && data.venta) { 
              rate = data.venta; 
              setExchangeRate(rate); 
            } 
          } catch (e) { } finally { 
            setIsRateLoading(false); 
          } 
        } 
        const factor = nc === 'USD' ? (1 / rate) : rate; 
        setState(p => ({ 
          ...p, 
          materialCostPerKg: roundCurrency(p.materialCostPerKg * factor, nc), 
          electricityCostPerKwh: roundCurrency(p.electricityCostPerKwh * factor, nc), 
          postProcessingCost: roundCurrency(p.postProcessingCost * factor, nc), 
          otherExpenses: roundCurrency(p.otherExpenses * factor, nc), 
          designCost: roundCurrency(p.designCost * factor, nc),
          resinLcdCost: roundCurrency((p.resinLcdCost || 0) * factor, nc),
          resinFepCost: roundCurrency((p.resinFepCost || 0) * factor, nc),
          resinCleaningCost: roundCurrency((p.resinCleaningCost || 0) * factor, nc)
        })); 
        if (nc === 'USD') { 
          updateState('taxPercent', 0); 
          setShowTaxInput(false); 
        } else { 
          updateState('taxPercent', 21); 
          setShowTaxInput(true); 
        } 
        setCurrency(nc); 
        playCurrencySound(nc); 
      };

      const toggleMode = () => {
        setIsAdvancedMode(prev => !prev);

      useEffect(() => {
        localStorage.setItem('calculator_mode', isAdvancedMode ? 'advanced' : 'basic');
      }, [isAdvancedMode]);

      // handleFileUpload ahora está definido arriba con soporte para múltiples archivos

      const breakdown = useMemo(() => {


        // Costos base (material + electricidad)
        let mc;
        if (isMixMode && filamentMix.length > 0) {
          mc = filamentMix.reduce((sum, f) => sum + (f.weightGrams / 1000) * f.costPerKg, 0);
          if (state.wasteGrams > 0) {
            const totalMixGrams = filamentMix.reduce((s, f) => s + f.weightGrams, 0);
            const avgCostPerKg = totalMixGrams > 0 ? mc / (totalMixGrams / 1000) : 0;
            mc += (state.wasteGrams / 1000) * avgCostPerKg;
          }
        } else {
          const totalGrams = state.weightGrams + state.wasteGrams;
          mc = (totalGrams / 1000) * state.materialCostPerKg;
        }
        const h = state.printTimeHours + (state.printTimeMinutes / 60);
        
        // Usar wattímetro manual si existe, si no el default
        const effectiveWatts = state.manualPowerWatts > 0 ? state.manualPowerWatts : state.printerPowerWatts;
        
        // Aplicar multiplicador de invierno (1.3x) si está activo
        const winterFactor = state.isWinterMode ? 1.3 : 1;
        
        const kwh = (effectiveWatts / 1000) * h * winterFactor;
        const ec = kwh * state.electricityCostPerKwh;
        
        // Cálculo de costos base iniciales
        let bc = mc + ec;

        // Costos adicionales de Resina
        if (state.isResinMode) {
          const lcdDepreciation = (h / (state.resinLcdLifeHours || 2000)) * (state.resinLcdCost || 0);
          const fepDepreciation = (h / (state.resinFepLifeHours || 100)) * (state.resinFepCost || 0);
          const cleaningCost = state.resinCleaningCost || 0;
          bc += lcdDepreciation + fepDepreciation + cleaningCost;
        }

        // Margen de error sobre costos base
        const po = bc * (state.failRatePercent / 100);

        // Total de costos base (CON depreciación si es resina)
        const tc = bc + po;

        // Costos adicionales que NO se multiplican por márgenes
        const extraCosts = state.postProcessingCost + state.otherExpenses + state.designCost;

        // Aplicar márgenes solo a costos base
        const mp = state.resellerMarkupPercent + state.maintenanceMarginPercent;
        const pbt = tc * (1 + mp / 100);

        // Calcular IVA sobre el precio con márgenes
        const ta = pbt * (state.taxPercent / 100);

        // Precio revendedor = precio con márgenes + IVA + costos extra
        const rp = pbt + ta + extraCosts;

        // Total de costos reales (para cálculo de ganancia)
        const totalCostWithExtras = tc + extraCosts;

        // Porcentaje total de markup
        const rtmp = totalCostWithExtras > 0 ? ((rp / totalCostWithExtras) - 1) * 100 : 0;

        // Ganancia revendedor
        const rprof = rp - totalCostWithExtras - ta;

        // Precio público
        const pp = rp * (1 + state.publicExtraMarkupPercent / 100);
        const pprof = pp - totalCostWithExtras - ta;

        // Precio online
        const op = pp * (1 + state.onlineMarkupPercent / 100);
        const oprof = op - totalCostWithExtras - ta;

        return {
          materialCost: mc,
          electricityCost: ec,
          baseCost: bc,
          productionOverhead: po,
          totalCost: totalCostWithExtras, // Ahora incluye los extras para mostrar
          resellerTotalMarkupPercent: rtmp,
          resellerPrice: rp,
          publicPrice: pp,
          onlinePrice: op,
          resellerProfit: rprof,
          publicProfit: pprof,
          onlineProfit: oprof
        };
      }, [state, isMixMode, filamentMix]);

              } else if (newZoom <= 0.4 && prevZoom <= 0.4) {

                setTimeout(() => setZoomMessage(null), 4000);
              }

              return newZoom;
            });

        window.addEventListener('wheel', handleWheel, { passive: false });

                {zoomMessage}

          >

                <div className={`flex p-1 rounded-xl border ${theme.border} ${currentThemeMode === 'light' ? 'bg-slate-100' : 'bg-brand-dark/30'}`}><button onClick={() => setUiSoundsEnabled(!uiSoundsEnabled)} className={`p-2 rounded-lg transition-all ${uiSoundsEnabled ? (currentThemeMode === 'light' ? 'bg-white text-brand-indigo shadow' : 'bg-brand-indigo text-white shadow') : 'text-slate-400 opacity-60 hover:opacity-100'}`} title={t.sound_effects}>{uiSoundsEnabled ? <Volume2 size={16} /> : <VolumeX size={16} />}</button></div>
                <BackgroundMusic theme={theme} t={t} />
                <button onClick={toggleCurrency} disabled={isRateLoading} className={`p-2 rounded-xl border flex items-center gap-2 transition-all ${theme.border} ${currentThemeMode === 'light' ? 'bg-slate-100 hover:bg-slate-200' : 'bg-brand-dark/30 hover:bg-white/5'}`} title={`${t.switch_to} ${currency === 'ARS' ? 'USD' : 'ARS'}`}>{isRateLoading ? (<Loader2 size={20} className="animate-spin text-brand-pink" />) : (<><div className="w-6 h-4 flex items-center justify-center">{currency === 'ARS' ? <FlagAR className="w-full h-full rounded-sm shadow-sm" /> : <FlagUS className="w-full h-full rounded-sm shadow-sm" />}</div><span className={`text-xs font-bold ${theme.textMain}`}>{currency}</span></>)}</button>
                <div className={`flex p-1 rounded-xl border ${theme.border} ${currentThemeMode === 'light' ? 'bg-slate-100' : 'bg-brand-dark/30'}`}><button onClick={() => setShowBudgetGenerator(true)} className={`p-2 rounded-lg transition-all text-slate-400 hover:${theme.textMain} hover:bg-brand-pink/20`} title={t.budget_tooltip}><span style={{ fontSize: '16px', lineHeight: 1 }}>📄</span></button></div>
                <div className={`flex p-1 rounded-xl border ${theme.border} ${currentThemeMode === 'light' ? 'bg-slate-100' : 'bg-brand-dark/30'}`}><button onClick={() => setShowStats(true)} className={`p-2 rounded-lg transition-all text-slate-400 hover:${theme.textMain} hover:bg-brand-pink/20`} title={t.stats_tooltip}><span style={{ fontSize: '16px', lineHeight: 1 }}>📊</span></button></div>
                <div className={`flex p-1 rounded-xl border ${theme.border} ${currentThemeMode === 'light' ? 'bg-slate-100' : 'bg-brand-dark/30'}`}><button onClick={() => setShowQuotesHistory(true)} className={`p-2 rounded-lg transition-all text-slate-400 hover:${theme.textMain} hover:bg-brand-pink/20`} title="Historial de Cotizaciones"><span style={{ fontSize: '16px', lineHeight: 1 }}>🗂️</span></button></div>
                <div className={`flex p-1 rounded-xl border ${theme.border} ${currentThemeMode === 'light' ? 'bg-slate-100' : 'bg-brand-dark/30'}`}><button onClick={handleSaveQuote} className={`p-2 rounded-lg transition-all text-slate-400 hover:${theme.textMain} hover:bg-brand-pink/20`} title="Guardar Proyecto Completo"><Save size={16} /></button></div>
                <div className={`flex p-1 rounded-xl border ${theme.border} ${currentThemeMode === 'light' ? 'bg-slate-100' : 'bg-brand-dark/30'}`}><button onClick={() => setCurrentThemeMode('original')} className={`p-2 rounded-lg transition-all ${currentThemeMode === 'original' ? 'bg-brand-indigo text-white shadow' : `text-slate-400 hover:${theme.textMain}`}`} title={t.original_theme}><Sparkles size={16} /></button><button onClick={() => setCurrentThemeMode('light')} className={`p-2 rounded-lg transition-all ${currentThemeMode === 'light' ? 'bg-white text-brand-indigo shadow' : `text-slate-400 hover:${theme.textMain}`}`} title={t.light_theme}><Sun size={16} /></button><button onClick={() => setCurrentThemeMode('dark')} className={`p-2 rounded-lg transition-all ${currentThemeMode === 'dark' ? 'bg-slate-700 text-white shadow' : `text-slate-400 hover:${theme.textMain}`}`} title={t.dark_theme}><Moon size={16} /></button><button onClick={() => { setCurrentThemeMode('custom'); setShowCustomPanel(true); }} className={`p-2 rounded-lg transition-all ${currentThemeMode === 'custom' ? 'bg-gradient-to-r from-purple-500 to-pink-500 text-white shadow' : `text-slate-400 hover:${theme.textMain}`}`} title="Modo Personalizado"><span style={{ fontSize: '16px', lineHeight: 1 }}>🎨</span></button></div>
                <button onClick={handleResetClick} className={`p-2.5 rounded-xl border transition-all ${theme.border} ${currentThemeMode === 'light' ? 'bg-slate-100 text-slate-500 hover:text-red-500 hover:border-red-200' : 'bg-brand-dark/30 text-slate-400 hover:text-red-400 hover:border-red-500/30'}`} title={t.reset_all}><RotateCcw size={16} /></button>
                {installPrompt && (<button onClick={handleInstallClick} className={`flex items-center gap-2 px-3 py-2 rounded-xl font-bold text-xs transition-all border ${currentThemeMode === 'light' ? 'bg-brand-indigo/10 text-brand-indigo border-brand-indigo/20' : 'bg-brand-cyan/10 text-brand-cyan border-brand-cyan/30'}`}><Download size={14} />{t.install_app}</button>)}
              </div>
            </header>

            {/* Tabs navegación */}
            <div className="flex justify-center mb-4">
              <div className={`flex p-1 rounded-2xl border gap-1 ${theme.border} ${currentThemeMode === 'light' ? 'bg-slate-100' : 'bg-brand-dark/40'}`}>
                <button onClick={() => setCurrentView('cotizador')} className={`px-5 py-2 rounded-xl text-sm font-bold transition-all ${currentView === 'cotizador' ? theme.buttonActive : theme.buttonInactive}`}>🧮 Cotizador</button>
                <button onClick={() => setCurrentView('pedidos')} className={`px-5 py-2 rounded-xl text-sm font-bold transition-all ${currentView === 'pedidos' ? theme.buttonActive : theme.buttonInactive}`}>📦 Pedidos Pro</button>

            {currentView === 'cotizador' && (<>
            {/* Nombre del Proyecto — centrado sobre el contenido */}

                <legend className={`text-xs font-bold px-3 uppercase tracking-wider mx-auto cursor-default ${isJobNameError ? 'text-red-500' : 'text-brand-pink'}`}>{t.project_name_label}</legend>
                <input type="text" value={state.jobName} onChange={(e) => { updateState('jobName', e.target.value); if(isJobNameError) setIsJobNameError(false); }} className={`min-w-[320px] bg-transparent border-none text-2xl md:text-3xl text-center font-bold outline-none uppercase tracking-tight py-1 ${isJobNameError ? 'text-red-500' : (currentThemeMode === 'light' ? 'text-brand-indigo placeholder:text-brand-indigo/30' : 'text-brand-pink placeholder:text-brand-pink/30')}`} placeholder="EJEMPLO 1" />
              </fieldset>
              {isJobNameError && (
                <div className="absolute top-full left-0 right-0 mt-2 text-center animate-fade-in">
                  <span className="bg-red-500 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-lg">⚠️ ¡Asigne un nombre al proyecto!</span>
                </div>
              )}
            </div>

            <div className={`w-fit mx-auto grid gap-6 grid-cols-1 md:grid-cols-2 ${isAdvancedMode ? 'lg:grid-cols-4' : 'lg:grid-cols-3'} xl:grid-cols-4 transition-all duration-500`}>
              <div className="space-y-6">
                <Card title={t.production_details} icon={PackageOpen} theme={theme}>
                  <div className="mb-6 grid grid-cols-2 gap-3">
                    <label className={`relative flex flex-col items-center justify-center w-full p-3 border-2 border-dashed rounded-xl transition-all cursor-pointer group ${currentThemeMode === 'light' ? 'border-slate-300 hover:border-brand-indigo hover:bg-slate-50' : 'border-brand-indigo hover:border-brand-cyan/50 hover:bg-brand-indigo/20'}`}><div className={`flex flex-col items-center gap-1 transition-colors ${theme.textSecondary} group-hover:${theme.accent}`}>{importStatus === 'success' ? <FileCheck size={20} className="text-green-500" /> : <FileUp size={20} />}<div className="text-center"><span className="block text-xs font-bold leading-tight">{t.upload_gcode}</span></div></div><input type="file" accept=".gcode,.gco,.g" onChange={handleFileUpload} className="hidden" onClick={(e) => (e.target).value = ''} multiple />{importStatus === 'success' && <span className="absolute -bottom-2 bg-green-500 text-white text-[9px] font-bold px-2 py-0.5 rounded-full animate-pulse truncate max-w-[90%]">{importMessage || "Ok"}</span>}{importStatus === 'error' && <span className="absolute -bottom-2 bg-red-500 text-white text-[9px] font-bold px-2 py-0.5 rounded-full">Error</span>}</label>

                  </div>

                  {/* Lista de archivos importados */}
                  {importedFiles.length > 0 && (
                    <div className={`mb-6 p-4 rounded-2xl border ${currentThemeMode === 'light' ? 'bg-slate-50 border-slate-200' : 'bg-brand-dark/30 border-brand-indigo/30'}`}>
