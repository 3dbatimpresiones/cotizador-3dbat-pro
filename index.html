                    Los datos se han restaurado correctamente. La aplicación necesita reiniciarse.
                  </p>
                  <button onClick={() => window.location.reload()} className="w-full py-4 rounded-2xl font-bold text-sm bg-green-500 text-white hover:bg-green-600 shadow-lg shadow-green-500/20 transition-all">Reiniciar Ahora</button>
                </div>
              </div>
            )}

            {showBudgetGenerator && (<BudgetGeneratorModal state={state} breakdown={breakdown} onClose={() => setShowBudgetGenerator(false)} currency={currency} t={t} theme={theme} customerName={customerName} playSuccessSound={playSuccessSound} />)}

            {showCustomPanel && currentThemeMode === 'custom' && (
              <div className="fixed top-24 right-4 z-[100] animate-fade-in">
                <div className="bg-slate-900/95 backdrop-blur-md w-80 p-5 rounded-3xl border border-white/10 shadow-2xl relative transform transition-all scale-100">
                  <div className="flex justify-between items-center mb-4">
                    <h3 className="text-lg font-black text-white flex items-center gap-2">🎨 Personalizar</h3>
                    <button onClick={() => setShowCustomPanel(false)} className="p-1.5 rounded-full hover:bg-white/10 text-white/70 hover:text-white transition-colors"><X size={18} /></button>
                  </div>

                  <div className="space-y-4">
                    <button
                      onClick={generateRandomPalette}
                      className="w-full py-3 rounded-xl bg-gradient-to-r from-purple-600 via-pink-600 to-orange-500 text-white text-sm font-bold shadow-lg shadow-pink-500/20 hover:shadow-pink-500/40 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2"
                    >
                      <Sparkles size={16} />
                      🎲 Aleatorio
                    </button>

                    <div className="space-y-3">
                      <div className="flex items-center justify-between p-2.5 rounded-xl bg-white/5 border border-white/10">
                        <div className="flex flex-col">
                          <span className="text-xs font-bold text-white">Principal</span>
                        </div>
                        <div className="relative overflow-hidden w-8 h-8 rounded-full shadow-sm ring-2 ring-white/20 cursor-pointer hover:scale-110 transition-transform">
                          <input type="color" value={customColors.primary} onChange={(e) => setCustomColors({ ...customColors, primary: e.target.value })} className="absolute -top-2 -left-2 w-12 h-12 cursor-pointer opacity-0" />
                          <div className="w-full h-full" style={{ backgroundColor: customColors.primary }}></div>
                        </div>
                      </div>

                      <div className="flex items-center justify-between p-2.5 rounded-xl bg-white/5 border border-white/10">
                        <div className="flex flex-col">
                          <span className="text-xs font-bold text-white">Secundario</span>
                        </div>
                        <div className="relative overflow-hidden w-8 h-8 rounded-full shadow-sm ring-2 ring-white/20 cursor-pointer hover:scale-110 transition-transform">
                          <input type="color" value={customColors.secondary} onChange={(e) => setCustomColors({ ...customColors, secondary: e.target.value })} className="absolute -top-2 -left-2 w-12 h-12 cursor-pointer opacity-0" />
                          <div className="w-full h-full" style={{ backgroundColor: customColors.secondary }}></div>
                        </div>
                      </div>

                      <div className="flex items-center justify-between p-2.5 rounded-xl bg-white/5 border border-white/10">
                        <div className="flex flex-col">
                          <span className="text-xs font-bold text-white">Acento</span>
                        </div>
                        <div className="relative overflow-hidden w-8 h-8 rounded-full shadow-sm ring-2 ring-white/20 cursor-pointer hover:scale-110 transition-transform">
                          <input type="color" value={customColors.accent} onChange={(e) => setCustomColors({ ...customColors, accent: e.target.value })} className="absolute -top-2 -left-2 w-12 h-12 cursor-pointer opacity-0" />
                          <div className="w-full h-full" style={{ backgroundColor: customColors.accent }}></div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}
            {showSaveToast && (
              <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] animate-bounce">
                <div className={`bg-red-500 text-white px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-3 border-2 border-white/20`}>
                  <div className="bg-white/20 p-1.5 rounded-full"><AlertTriangle size={20} /></div>
                  <span className="font-bold tracking-wide">¡Hubo un error al guardar!</span>
                </div>
              </div>
            )}
          </div >
        </>
      );
    };

    const rootEl = document.getElementById('root');
    if (rootEl) {
      const root = ReactDOM.createRoot(rootEl);
      root.render(<AuthGate />);
    } else {
      console.error("Root element not found");
    }
  </script>
  <script>
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
  </script>
</body>

</html>
